<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Creduce · Profile</title>

  <style>
    .playfair { font-family: 'Playfair Display', serif; }

    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.05);
    }

    /* Input */
    .field {
      width: 100%;
      padding: 11px 14px 11px 42px;
      border: 1.5px solid #ede8df;
      border-radius: 12px;
      font-size: 14px;
      color: #374151;
      background: #fff;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field:focus {
      border-color: #c9773a;
      box-shadow: 0 0 0 3px rgba(201,119,58,0.12);
    }
    .field::placeholder { color: #9ca3af; }
    .field-wrap { position: relative; }
    .field-icon {
      position: absolute; left: 13px; top: 50%;
      transform: translateY(-50%); pointer-events: none;
    }

    /* Buttons */
    .btn-primary {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      background: #c9773a; color: #fff;
      padding: 11px 20px; border-radius: 12px;
      font-size: 14px; font-weight: 600;
      border: none; cursor: pointer; width: 100%;
      transition: opacity 0.15s, transform 0.1s;
      text-decoration: none;
    }
    .btn-primary:hover { opacity: 0.9; transform: scale(1.01); }

    .btn-danger {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      background: #fdecea; color: #e76f51;
      padding: 11px 20px; border-radius: 12px;
      font-size: 14px; font-weight: 600;
      border: none; cursor: pointer; width: 100%;
      transition: background 0.15s;
      text-decoration: none;
    }
    .btn-danger:hover { background: #fad3cd; }

    /* Back link */
    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      color: #9ca3af; font-size: 13px; font-weight: 500;
      text-decoration: none;
      padding: 7px 12px; border-radius: 10px;
      background: #fff;
      box-shadow: 0 1px 6px rgba(0,0,0,0.06);
      transition: background 0.15s, color 0.15s;
    }
    .back-link:hover { background: #f5e6d3; color: #c9773a; }

    /* Avatar ring */
    .avatar-ring {
      width: 64px; height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, #f5e6d3, #ede8df);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 0 0 3px #fff, 0 0 0 5px #ede8df;
    }

    /* Stat chip */
    .info-row {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 0;
      border-bottom: 1px solid #f5f0ea;
    }
    .info-row:last-child { border-bottom: none; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 0.45s ease both; }
  </style>
</head>

<body class="min-h-screen p-5 md:p-8">

  <!-- Header -->
  <div class="flex items-center justify-between mb-8 fade-up">
    <a href="/" class="back-link">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
        stroke-width="2" stroke="currentColor" class="w-4 h-4">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 15L3 9m0 0l6-6M3 9h12a6 6 0 010 12h-3"/>
      </svg>
      Back
    </a>

    <div class="text-center">
      <h1 class="playfair text-2xl font-bold text-gray-800">Profile</h1>
    </div>

    <!-- Spacer -->
    <div class="w-20"></div>
  </div>

  <!-- Main Card -->
  <div class="card max-w-md mx-auto overflow-hidden fade-up" style="animation-delay:0.08s">

    <div class="p-6 md:p-7">

      <!-- User Info Section -->
      <div class="flex items-center gap-4 mb-6">
        <div class="avatar-ring">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
            stroke-width="1.5" stroke="#c9773a" class="w-7 h-7">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/>
          </svg>
        </div>
        <div class="flex-1 min-w-0">
          <p class="text-lg font-bold text-gray-800 truncate">{{ user.name }}</p>
          <p class="text-sm text-gray-400 truncate">{{ user.email }}</p>
        </div>
        <!-- Verified badge -->
        <div class="w-8 h-8 rounded-xl bg-teal-50 flex items-center justify-center flex-shrink-0">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
            stroke-width="1.8" stroke="#2a9d8f" class="w-4 h-4">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
        </div>
      </div>

      <!-- Info rows -->
      <div class="mb-6">
        <div class="info-row">
          <div class="w-8 h-8 rounded-xl bg-amber-50 flex items-center justify-center flex-shrink-0">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
              stroke-width="1.6" stroke="#c9773a" class="w-4 h-4">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.5 20.25a8.25 8.25 0 0115 0"/>
            </svg>
          </div>
          <div class="flex-1 min-w-0">
            <p class="text-xs text-gray-400">Name</p>
            <p class="text-sm font-semibold text-gray-700 truncate">{{ user.name }}</p>
          </div>
        </div>
        <div class="info-row">
          <div class="w-8 h-8 rounded-xl bg-amber-50 flex items-center justify-center flex-shrink-0">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
              stroke-width="1.6" stroke="#c9773a" class="w-4 h-4">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75"/>
            </svg>
          </div>
          <div class="flex-1 min-w-0">
            <p class="text-xs text-gray-400">Email</p>
            <p class="text-sm font-semibold text-gray-700 truncate">{{ user.email }}</p>
          </div>
        </div>
      </div>

      <!-- Divider -->
      <hr style="border: none; border-top: 1.5px solid #f5f0ea; margin: 0 0 24px;" />

      <!-- Budget Section -->
      <div class="mb-6">
        <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider flex items-center gap-1.5 mb-3">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
            stroke-width="1.7" stroke="#9ca3af" class="w-3.5 h-3.5">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M2.25 18.75a60.07 60.07 0 0115.797 2.101c.727.198 1.453-.342 1.453-1.096V18.75M3.75 4.5v.75A.75.75 0 013 6h-.75m0 0v-.375c0-.621.504-1.125 1.125-1.125H20.25M2.25 6v9m18-10.5v.75c0 .414.336.75.75.75h.75m-1.5-1.5h.375c.621 0 1.125.504 1.125 1.125v9.75c0 .621-.504 1.125-1.125 1.125h-.375m1.5-1.5H21a.75.75 0 00-.75.75v.75m0 0H3.75m0 0h-.375a1.125 1.125 0 01-1.125-1.125V15m1.5 1.5v-.75A.75.75 0 003 15h-.75"/>
          </svg>
          Monthly Budget
        </p>

        <form method="post">
          <div class="field-wrap mb-3"> 
            <span class="field-icon font-bold text-sm" style="color:#c9773a">₹</span>
            <input
              type="number"
              name="monthly_budget"
              placeholder="Enter this month's budget"
              step="0.01"
              min="0"
              class="field"
            />
          </div>

          <button type="submit" class="btn-primary">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
              stroke-width="2.2" stroke="currentColor" class="w-4 h-4">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            Save Budget
          </button>
        </form>
      </div>

      <!-- Divider -->
      <hr style="border: none; border-top: 1.5px solid #f5f0ea; margin: 0 0 20px;" />

      <!-- Logout -->
      <a href="/logout" class="btn-danger">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
          stroke-width="2" stroke="currentColor" class="w-4 h-4">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75"/>
        </svg>
        Logout
      </a>
    </div>
    
    <!-- Top accent strip -->
    <div class="h-2 w-full" style="background: linear-gradient(90deg, #c9773a, #e6a96a)"></div>
  </div>
  

  <!-- Footer note -->
  <p class="text-center text-xs text-gray-400 mt-5 fade-up" style="animation-delay:0.16s">
    Your data is stored securely and privately.
  </p>

</body>
</html>
